# nginx delante de la FastAPI/PTB.
# Termina TLS aquí (cert self-signed) — Telegram lo acepta porque le subimos
# el cert público vía setWebhook(certificate=...).
#
# Solo dos rutas públicas:
#   /telegram/webhook  → backend
#   /health            → backend
# Cualquier otra → 404 (la API interna queda oculta).

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/nginx.pem;
    ssl_certificate_key /etc/nginx/certs/nginx.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 4M;

    # Resolvemos por service name del compose: docker DNS dirige a la IP
    # actual del contenedor `app`, sin importar reinicios o cambios de IP.
    # Puerto interno del contenedor app: 80 (no el 8121 publicado al host).
    location = /telegram/webhook {
        proxy_pass http://app:80/telegram/webhook;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
    }

    location = /health {
        proxy_pass http://app:80/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        return 404;
    }
}
