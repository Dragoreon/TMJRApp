services:
  app:
    build: .
    image: tmjrapp:latest
    ports:
      - "8121:80"
    environment:
      APP_ENV: ${APP_ENV:-dev}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://tmjr:tmjr@db:5432/tmjr}
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      TELEGRAM_WEBHOOK_CERT_FILE: ${TELEGRAM_WEBHOOK_CERT_FILE:-/app/certs/nginx.pem}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      TELEGRAM_THREAD_ID: ${TELEGRAM_THREAD_ID:-}
    volumes:
      # Cert público para que el lifespan lo suba a Telegram en setWebhook.
      - ${CERT_PEM_HOST_PATH:-./certs/nginx.pem}:/app/certs/nginx.pem:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tmjr
      POSTGRES_PASSWORD: tmjr
      POSTGRES_DB: tmjr
    volumes:
      - tmjr_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tmjr -d tmjr"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # Proxy público: termina HTTPS con cert self-signed. Telegram acepta el cert
  # porque el lifespan de la app lo sube vía setWebhook(certificate=...).
  # Solo expone /telegram/webhook y /health, todo lo demás 404.
  # Opt-in: arranca con `docker compose --profile public up -d`.
  proxy:
    image: nginx:1.27-alpine
    profiles: ["public"]
    ports:
      # El puerto por defecto de salida es 8443, pero hacemos redirección luego de la red interna a la externa en ese puertoeste
      - "${PROXY_PORT:-8000}:443"
    volumes:
      - ${NGINX_CONF_HOST_PATH:-./nginx/default.conf}:/etc/nginx/conf.d/default.conf:ro
      - ${CERT_PEM_HOST_PATH:-./certs/nginx.pem}:/etc/nginx/certs/nginx.pem:ro
      - ${CERT_KEY_HOST_PATH:-./certs/nginx.key}:/etc/nginx/certs/nginx.key:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  tmjr_pgdata:
    name: tmjrapp_tmjr_pgdata
    # En local: volumen named gestionado por Docker (data en /var/lib/docker/volumes/).
    # En QNAP: el script `build-compose-env.sh` añade `driver_opts` para anclar
    # esta ruta a /share/VMTemplates/TMJR/postgresql al generar el yaml de deploy.
